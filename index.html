<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust Empire | আপনার আস্থার অনলাইন শপ</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; }
        header { background-color: #f57224; padding: 15px; color: white; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding-bottom: 10px; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; }
        .product-info { padding: 8px; text-align: left; }
        .product-name { font-size: 14px; height: 36px; overflow: hidden; margin: 5px 0; color: #333; }
        .product-price { color: #f57224; font-weight: bold; font-size: 16px; }
        .loading { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin: 0; font-size: 24px;">Trust Empire</h1>
    </header>

    <div class="container">
        <h2 style="font-size: 18px; color: #444;">আমাদের পণ্যসমূহ</h2>
        <div id="product-list" class="product-grid">
            <div class="loading">প্রোডাক্ট লোড হচ্ছে...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // আপনার প্রোভাইড করা কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyAU4mgcRg_Hj7zMy2XDiZUg8tK3GLwmp68",
            authDomain: "trust-empire.firebaseapp.com",
            projectId: "trust-empire",
            storageBucket: "trust-empire.firebasestorage.app",
            messagingSenderId: "792440969463",
            appId: "1:792440969463:web:2d3031d755c4ae04939bf2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ডাটাবেস থেকে প্রোডাক্ট আনার ফাংশন
        async function getProducts() {
            const productListDiv = document.getElementById('product-list');
            try {
                // আপনার ফায়ারবেস কালেকশনের নাম যদি 'products' হয়
                const querySnapshot = await getDocs(collection(db, "products"));
                productListDiv.innerHTML = ""; // লোডিং লেখা মুছে ফেলা

                if (querySnapshot.empty) {
                    productListDiv.innerHTML = "<p>কোনো প্রোডাক্ট পাওয়া যায়নি।</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const product = doc.data();
                    const productHTML = `
                        <div class="product-card">
                            <img src="${product.image || 'https://via.placeholder.com/150'}" alt="${product.name}">
                            <div class="product-info">
                                <div class="product-name">${product.name}</div>
                                <div class="product-price">৳ ${product.price}</div>
                            </div>
                        </div>
                    `;
                    productListDiv.innerHTML += productHTML;
                });
            } catch (error) {
                console.error("Error fetching products: ", error);
                productListDiv.innerHTML = "<p>ডাটা আনতে সমস্যা হচ্ছে। ফায়ারবেস রুলস চেক করুন।</p>";
            }
        }

        getProducts();
    </script>
</body>
</html>
।
